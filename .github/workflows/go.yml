name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: test (${{ matrix.os }}, go ${{ matrix.go }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        go: ["1.22", "1.23"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go }}
          cache: true

      - name: Install Python (Linux / macOS)
        if: runner.os != 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python deps
        run: pip install msgpack

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Test (Linux / macOS)
        if: runner.os != 'Windows'
        run: go test -count=1 -race -timeout 120s -cover ./...

      - name: Test (Windows)
        if: runner.os == 'Windows'
        # -race requires CGO which needs a C compiler on Windows.
        # Run without -race; the Linux job covers the race detector.
        run: go test -count=1 -timeout 120s -cover ./...

  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
          cache: true

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m